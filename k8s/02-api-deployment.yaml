apiVersion: apps/v1
kind: Deployment
metadata:
  name: arkashri-api
  namespace: arkashri
  labels:
    app: arkashri-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: arkashri-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: arkashri-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      containers:
      - name: arkashri-api
        image: your-aws-account-id.dkr.ecr.us-east-1.amazonaws.com/arkashri-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: arkashri-config
        - secretRef:
            name: arkashri-secrets
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: arkashri-api-service
  namespace: arkashri
spec:
  selector:
    app: arkashri-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
