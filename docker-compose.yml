services:

  # ── Infrastructure ─────────────────────────────────────────────────────────
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: arkashri
      POSTGRES_USER: arkashri
      POSTGRES_PASSWORD: arkashri
    ports:
      - "5440:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U arkashri -d arkashri" ]
      interval: 5s
      timeout: 5s
      retries: 20

  read_replica:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: arkashri_replica
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5441:5432"
    volumes:
      - pg_replica_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d arkashri_replica" ]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Backend API ────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8080"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://arkashri:arkashri@db:5432/arkashri
      DATABASE_READ_REPLICA_URL: postgresql+asyncpg://postgres:postgres@read_replica:5432/arkashri_replica
      REDIS_URL: redis://redis:6379/0
      ENABLE_ADVANCED_RATE_LIMITING: "true"
      ENABLE_LOAD_BALANCER: "true"
      API_REPLICAS: "3"
      DB_POOL_SIZE: "20"
      DB_MAX_OVERFLOW: "30"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      read_replica:
        condition: service_healthy
    # Auto-run migrations on every startup, then start the API
    command: >
      sh -c "
        alembic upgrade head &&
        gunicorn arkashri.main:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:8080
      "
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\" || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://api:8080
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    depends_on:
      api:
        condition: service_healthy

  # ── ARQ Background Worker ──────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://arkashri:arkashri@db:5432/arkashri
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m arq arkashri.worker.WorkerSettings

  # ── Seed First Admin User (runs once, then exits) ─────────────────────────
  seed:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://arkashri:arkashri@db:5432/arkashri
      SEED_EMAIL: admin@arkashri.io
      SEED_PASSWORD: Admin@2026!
      SEED_TENANT: default_tenant
    depends_on:
      api:
        condition: service_healthy
    command: python scripts/seed_admin.py
    restart: "no" # run once and exit

volumes:
  pg_data:
  pg_replica_data:
