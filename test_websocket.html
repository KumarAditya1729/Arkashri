<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Test</title>
</head>
<body>
    <h1>WebSocket Connection Test</h1>
    <div>
        <button onclick="connect()">Connect WebSocket</button>
        <button onclick="disconnect()">Disconnect</button>
        <button onclick="sendMessage()">Send Test Message</button>
    </div>
    <div>
        <h3>Status: <span id="status">Disconnected</span></h3>
        <h3>Messages:</h3>
        <div id="messages" style="border: 1px solid #ccc; height: 300px; overflow-y: scroll; padding: 10px;"></div>
    </div>

    <script>
        let socket = null;
        const statusEl = document.getElementById('status');
        const messagesEl = document.getElementById('messages');

        function log(message) {
            console.log(message);
            messagesEl.innerHTML += '<div>' + message + '</div>';
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function connect() {
            if (socket) {
                log('WebSocket already connected');
                return;
            }

            // Try to connect to the WebSocket endpoint
            const wsUrl = 'ws://localhost:8000/ws/audit/default_tenant/IN';
            log('Connecting to: ' + wsUrl);
            
            socket = new WebSocket(wsUrl);

            socket.onopen = function(event) {
                log('WebSocket connected successfully!');
                statusEl.textContent = 'Connected';
                statusEl.style.color = 'green';
            };

            socket.onmessage = function(event) {
                log('Received: ' + event.data);
            };

            socket.onclose = function(event) {
                log('WebSocket disconnected. Code: ' + event.code + ', Reason: ' + event.reason);
                statusEl.textContent = 'Disconnected';
                statusEl.style.color = 'red';
                socket = null;
            };

            socket.onerror = function(error) {
                log('WebSocket Error: ' + error);
                statusEl.textContent = 'Error';
                statusEl.style.color = 'red';
                console.error('WebSocket error details:', error);
            };
        }

        function disconnect() {
            if (socket) {
                socket.close();
            }
        }

        function sendMessage() {
            if (socket && socket.readyState === WebSocket.OPEN) {
                const message = 'Test message from client at ' + new Date().toISOString();
                socket.send(message);
                log('Sent: ' + message);
            } else {
                log('Cannot send message - WebSocket not connected');
            }
        }
    </script>
</body>
</html>
