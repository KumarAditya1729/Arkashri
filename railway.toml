# railway.toml - Arkashri monorepo deployment config
# Two services share the same Docker image but run different processes.

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# API Service
# Runs the FastAPI app via Gunicorn + UvicornWorker.

preDeployCommand = "alembic upgrade head"
startCommand = "sh -c 'exec gunicorn arkashri.main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120 --keep-alive 5 --preload --worker-tmp-dir /dev/shm --access-logfile - --error-logfile -'"

healthcheckPath = "/readyz"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
