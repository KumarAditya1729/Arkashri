# fly.toml — Arkashri Backend
app = "arkashri-backend"
primary_region = "sin"   # Singapore — closest free region to India

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  ENABLE_ML = "false"
  ENABLE_BLOCKCHAIN = "false"
  PYTHONUNBUFFERED = "1"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
