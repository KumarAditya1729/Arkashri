name: Build and Deploy to AWS EKS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: arkashri-backend
  EKS_CLUSTER_NAME: arkashri-production-cluster

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Update kube config
        run: aws eks update-kubeconfig --name $EKS_CLUSTER_NAME --region $AWS_REGION

      - name: Deploy to Amazon EKS
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Apply the configurations
          kubectl apply -f k8s/01-config.yaml
          
          # Force the deployment to use the new image
          kubectl set image deployment/arkashri-api arkashri-api=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -n arkashri
          kubectl set image deployment/arkashri-worker arkashri-worker=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -n arkashri
          
          # Apply the rest of the infrastructure
          kubectl apply -f k8s/02-api-deployment.yaml
          kubectl apply -f k8s/03-worker-deployment.yaml
          kubectl apply -f k8s/04-ingress.yaml

      - name: Verify Deployment
        run: |
          kubectl rollout status deployment/arkashri-api -n arkashri
          kubectl rollout status deployment/arkashri-worker -n arkashri
