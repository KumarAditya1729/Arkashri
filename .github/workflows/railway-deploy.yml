name: Deploy Backend to Railway

on:
  push:
    branches: [main]
    paths:
      - 'arkashri/**'
      - 'requirements.txt'
      - 'pyproject.toml'
      - 'alembic/**'
      - 'Dockerfile'

jobs:
  deploy:
    name: Redeploy Railway Backend
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Railway Redeploy
        run: |
          curl -s -X POST \
            "https://backboard.railway.app/graphql/v2" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_API_TOKEN }}" \
            -d '{
              "query": "mutation serviceInstanceRedeploy($environmentId: String!, $serviceId: String!) { serviceInstanceRedeploy(environmentId: $environmentId, serviceId: $serviceId) }",
              "variables": {
                "environmentId": "${{ secrets.RAILWAY_ENVIRONMENT_ID }}",
                "serviceId": "${{ secrets.RAILWAY_SERVICE_ID }}"
              }
            }' | tee /tmp/railway_response.json
          # Check if response contains errors
          if cat /tmp/railway_response.json | grep -q '"errors"'; then
            echo "Railway deploy failed:"
            cat /tmp/railway_response.json
            exit 1
          fi
          echo "Railway redeploy triggered successfully"
